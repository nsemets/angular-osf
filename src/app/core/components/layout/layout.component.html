<main class="layout" [class.layout-desktop]="isWeb()" [class.layout-tablet]="!isWeb()">
  @if (isWeb()) {
    <osf-sidenav></osf-sidenav>
  }

  <div class="content-wrapper" osfScrollTopOnRouteChange>
    @if (isWeb()) {
      <osf-banner-component></osf-banner-component>
      <osf-header></osf-header>
    } @else {
      <osf-topnav></osf-topnav>
      @if (isMedium()) {
        <osf-breadcrumb></osf-breadcrumb>
      }
      <osf-banner-component></osf-banner-component>
    }

    <router-outlet />

    <osf-footer></osf-footer>
  </div>

  @if (isMaintenanceMode()) {
    <section class="maintenance-overlay font-bold text-xl flex flex-column align-items-center justify-content-center">
      <p>{{ 'maintenance.title' | translate }}</p>
      <p>{{ 'maintenance.message' | translate }}</p>
    </section>
  }
</main>

<p-confirm-dialog
  id="dialog"
  styleClass="w-full md:w-6 xl:w-5"
  [header]="'common.accessibility.confirmation' | translate"
/>
