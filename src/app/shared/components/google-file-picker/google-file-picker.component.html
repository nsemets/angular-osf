<section class="google-file-picker-container" [class.file-picker]="isFolderPicker()">
  @if (isFolderPicker()) {
    <div class="action-container">
      <p-button
        [label]="'settings.addons.configureAddon.googleFilePicker.selectRootFolder' | translate"
        class="authorize-button"
        [class.visible]="visible()"
        [disabled]="isGFPDisabled()"
        (click)="createPicker()"
      ></p-button>
    </div>
  }
</section>
