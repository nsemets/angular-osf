@if (isLoading()) {
  <div class="w-full">
    <p-skeleton height="2rem" />
  </div>
} @else {
  @if (funders()?.length) {
    <ul class="flex flex-column gap-2">
      @for (funder of funders(); track funder.funderIdentifier) {
        <li>{{ funder.funderName }}</li>
      }
    </ul>
  } @else {
    <p>{{ 'project.overview.metadata.noInformation' | translate }}</p>
  }
}
