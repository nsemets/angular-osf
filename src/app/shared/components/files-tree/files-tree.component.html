<osf-files-drop-zone class="flex flex-1" [enabled]="!viewOnly()" (filesDropped)="onDropFiles($event)">
  @if (isLoading() && !isLoadingMore()) {
    <div class="flex flex-1">
      <osf-loading-spinner></osf-loading-spinner>
    </div>
  } @else {
    <div class="files-table flex">
      <p-tree
        class="tree-table w-full"
        [lazy]="true"
        [loading]="isLoadingMore()"
        [selectionMode]="selectionMode()"
        [scrollHeight]="scrollHeight()"
        [value]="nodes()"
        [virtualScroll]="true"
        [virtualScrollItemSize]="virtualScrollItemSize"
        (onLazyLoad)="onLazyLoad($event)"
      >
        <ng-template let-file pTemplate="default">
          <osf-files-tree-row
            [file]="file.data"
            [hasFoldersStack]="foldersStack().length > 0"
            [actionsTemplate]="rowActions"
            (openParentFolder)="openParentFolder()"
            (openEntry)="openEntry($event)"
          ></osf-files-tree-row>
        </ng-template>

        <ng-template pTemplate="empty">
          <div class="flex align-items-center justify-content-center h-full p-4">
            @if (viewOnly()) {
              <h3 class="font-normal mb-4 text-no-transform">{{ 'files.emptyState' | translate }}</h3>
            } @else {
              <div class="flex flex-column align-items-center justify-content-center">
                <i class="fa-solid fa-cloud-arrow-up text-5xl"></i>
                <p class="text-xl text-center">{{ 'files.dropText' | translate }}</p>
              </div>
            }
          </div>
        </ng-template>
      </p-tree>
    </div>
  }
</osf-files-drop-zone>

<ng-template #rowActions let-file let-isFolder="isFolder">
  @if (allowedMenuActions().delete) {
    <p-button
      icon="fas fa-trash"
      severity="danger"
      text
      rounded
      [pTooltip]="'common.buttons.delete' | translate"
      tooltipPosition="top"
      (onClick)="deleteEntry(file)"
    />
  }
</ng-template>
