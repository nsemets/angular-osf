<section class="container xl:mt-6">
  <osf-sub-header [title]="'chooseRepository.title' | translate"></osf-sub-header>

  <div class="py-4 px-3 md:p-5 xl:px-4">
    <p>{{ 'chooseRepository.intro' | translate }}</p>

    <div class="grid mt-5">
      @for (repository of repositories; track repository.id) {
        <div class="col-12 md:col-6 xl:col-4">
          <article class="repository-card flex flex-column align-items-center text-center h-full p-4 gap-3">
            <img class="repository-card-logo" [src]="repository.logoUrl" [alt]="repository.titleKey | translate" />

            <h3>{{ repository.titleKey | translate }}</h3>

            <p>{{ repository.descriptionKey | translate }}</p>

            <a
              class="repository-card-link p-button p-button-outlined no-underline mt-auto"
              [href]="repository.linkUrl"
              target="_blank"
              rel="noopener noreferrer"
            >
              {{ repository.linkTextKey | translate }}
            </a>
          </article>
        </div>
      }
    </div>
  </div>
</section>
